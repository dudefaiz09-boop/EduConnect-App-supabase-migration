name: API Smoke

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API base URL ending with /api'
        required: false
        type: string
  schedule:
    - cron: '17 3 * * *'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Resolve API base URL
        id: api
        env:
          INPUT_API_BASE_URL: ${{ inputs.api_base_url }}
          CONFIG_API_BASE_URL: ${{ secrets.API_BASE_URL || vars.API_BASE_URL }}
        run: |
          API_BASE_URL="${INPUT_API_BASE_URL:-$CONFIG_API_BASE_URL}"
          if [ -z "$API_BASE_URL" ]; then
            echo "::error::API_BASE_URL is required for API smoke checks. Configure a repository variable/secret or provide workflow_dispatch input."
            exit 1
          fi
          case "$API_BASE_URL" in
            https://*/api) ;;
            *)
              echo "::error::API_BASE_URL must be an HTTPS URL ending in /api"
              exit 1
              ;;
          esac
          echo "api_base_url=$API_BASE_URL" >> "$GITHUB_OUTPUT"
      - name: Run API smoke test
        env:
          API_BASE_URL: ${{ steps.api.outputs.api_base_url }}
          SMOKE_TENANT_ID: ${{ secrets.SMOKE_TENANT_ID || vars.SMOKE_TENANT_ID }}
          SMOKE_ACCESS_TOKEN: ${{ secrets.SMOKE_ACCESS_TOKEN }}
        run: pnpm smoke:web-api
